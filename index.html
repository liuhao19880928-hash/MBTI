<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>测测你的打工魂</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>💼</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --orange: #FF6B35;
  --orange-deep: #E55A2B;
  --yellow: #FFD23F;
  --warm-bg: #FFF8F0;
  --cream: #FFF1E0;
  --text: #2D2420;
  --text-light: #7A6E66;
  --card-bg: #FFFFFF;
  --shadow-sm: 0 2px 8px rgba(45,36,32,0.06);
  --shadow-md: 0 4px 16px rgba(45,36,32,0.10);
  --shadow-lg: 0 8px 32px rgba(45,36,32,0.14);
  --radius: 16px;
  --radius-sm: 10px;
}

html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--warm-bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  overflow-x: hidden;
  line-height: 1.6;
}

.app-container {
  width: 100%;
  max-width: 480px;
  min-height: 100dvh;
  position: relative;
  overflow: hidden;
  background: var(--warm-bg);
}

.page {
  position: absolute;
  top: 0; left: 0;
  width: 100%; min-height: 100dvh;
  padding: 32px 20px 40px;
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: translateY(12px);
  pointer-events: none;
  transition: opacity 0.35s cubic-bezier(0.4,0,0.2,1), transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
.page.active {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
  position: relative;
}

/* ===== COVER PAGE ===== */
.cover-page { align-items: center; justify-content: center; text-align: center; gap: 24px; }
.cover-emoji-group {
  font-size: 72px;
  line-height: 1;
  animation: coverBounce 2s ease-in-out infinite;
  filter: drop-shadow(0 4px 12px rgba(255,107,53,0.25));
}
@keyframes coverBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
.cover-title {
  font-size: clamp(2rem, 8vw, 2.5rem);
  font-weight: 900;
  letter-spacing: 0.02em;
  background: linear-gradient(135deg, var(--orange-deep), var(--orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.cover-subtitle {
  font-size: 1rem;
  color: var(--text-light);
  letter-spacing: 0.04em;
}
.cover-participants {
  display: flex; align-items: center; gap: 8px;
  background: var(--card-bg);
  padding: 10px 20px;
  border-radius: 50px;
  box-shadow: var(--shadow-sm);
  font-size: 0.9rem;
  color: var(--text-light);
}
.cover-participants .count {
  font-weight: 700;
  color: var(--orange);
  font-size: 1.15rem;
}
.btn-start {
  background: linear-gradient(135deg, var(--orange), var(--orange-deep));
  color: #fff;
  border: none;
  padding: 16px 56px;
  font-size: 1.2rem;
  font-weight: 700;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(255,107,53,0.35);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  letter-spacing: 0.06em;
}
.btn-start:active { transform: scale(0.96); box-shadow: 0 3px 12px rgba(255,107,53,0.3); }

/* ===== QUIZ PAGE ===== */
.quiz-page { gap: 20px; }
.progress-wrap {
  display: flex; align-items: center; gap: 10px;
}
.progress-bar {
  flex: 1; height: 8px;
  background: var(--cream);
  border-radius: 10px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--orange), var(--yellow));
  border-radius: 10px;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}
.progress-text {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--orange);
  min-width: 36px;
  text-align: right;
}
.quiz-emoji {
  text-align: center;
  font-size: 56px;
  line-height: 1;
  margin: 8px 0 4px;
}
.quiz-question {
  font-size: 1.15rem;
  font-weight: 700;
  line-height: 1.5;
  text-align: center;
  color: var(--text);
}
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-option {
  display: flex; align-items: center; gap: 12px;
  background: var(--card-bg);
  border: 2px solid transparent;
  padding: 14px 18px;
  border-radius: var(--radius-sm);
  font-size: 1rem;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.quiz-option:active { transform: scale(0.98); }
.quiz-option.selected {
  border-color: var(--orange);
  background: #FFF5EE;
}
.quiz-option-letter {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--cream);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--orange);
  flex-shrink: 0;
  transition: background 0.2s ease, color 0.2s ease;
}
.quiz-option.selected .quiz-option-letter {
  background: var(--orange);
  color: #fff;
}

/* ===== RESULT PAGE ===== */
.result-page { align-items: center; text-align: center; gap: 16px; }
.result-canvas {
  width: 280px;
  height: 280px;
  border-radius: 24px;
  display: block;
  margin: 0 auto;
  animation: resultPop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes resultPop {
  0% { transform: scale(0.3); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.result-type {
  font-size: clamp(1.6rem, 7vw, 2rem);
  font-weight: 900;
  color: var(--text);
}
.result-desc {
  font-size: 1rem;
  color: var(--text-light);
  max-width: 320px;
  line-height: 1.7;
}
.result-tags {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
}
.result-tag {
  background: var(--cream);
  color: var(--orange-deep);
  padding: 6px 14px;
  border-radius: 50px;
  font-size: 0.85rem;
  font-weight: 600;
}
.result-actions {
  display: flex; flex-direction: column; gap: 10px;
  width: 100%; max-width: 280px;
  margin-top: 8px;
}
.btn-action {
  padding: 14px 0;
  border-radius: 50px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  letter-spacing: 0.04em;
}
.btn-action:active { transform: scale(0.96); }
.btn-primary { background: linear-gradient(135deg, var(--orange), var(--orange-deep)); color: #fff; box-shadow: 0 4px 16px rgba(255,107,53,0.25); }
.btn-secondary { background: var(--card-bg); color: var(--text); box-shadow: var(--shadow-sm); }
.btn-outline { background: transparent; color: var(--orange); border: 2px solid var(--orange); }

/* ===== RANKING PAGE ===== */
.ranking-page { gap: 20px; }
.ranking-title {
  font-size: 1.4rem; font-weight: 900; text-align: center;
}
.ranking-subtitle { text-align: center; font-size: 0.9rem; color: var(--text-light); }
.ranking-list { display: flex; flex-direction: column; gap: 6px; }
.ranking-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--card-bg);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-sm);
  font-size: 0.9rem;
  transition: background 0.2s ease;
}
.ranking-item.is-you {
  background: #FFF5EE;
  box-shadow: 0 0 0 2px var(--orange);
}
.ranking-rank {
  width: 28px; font-weight: 900; color: var(--text-light); flex-shrink: 0; text-align: center;
}
.ranking-emoji { font-size: 1.3rem; flex-shrink: 0; }
.ranking-name { flex: 1; font-weight: 600; }
.ranking-bar-wrap { flex: 1; height: 8px; background: var(--cream); border-radius: 10px; overflow: hidden; min-width: 60px; }
.ranking-bar { height: 100%; background: linear-gradient(90deg, var(--orange), var(--yellow)); border-radius: 10px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
.ranking-pct { font-weight: 700; color: var(--orange); min-width: 44px; text-align: right; font-size: 0.85rem; }

/* ===== COMMENT PAGE ===== */
.comment-page { gap: 16px; }
.comment-title { font-size: 1.4rem; font-weight: 900; text-align: center; }
.comment-list { display: flex; flex-direction: column; gap: 10px; flex: 1; }
.comment-item {
  background: var(--card-bg);
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-sm);
  font-size: 0.9rem;
}
.comment-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.comment-nickname { font-weight: 700; font-size: 0.9rem; }
.comment-type-tag {
  font-size: 0.75rem; color: var(--orange); background: var(--cream);
  padding: 2px 8px; border-radius: 50px; font-weight: 600;
}
.comment-body { color: var(--text-light); line-height: 1.5; }
.comment-input-wrap {
  display: flex; gap: 8px;
  background: var(--card-bg);
  padding: 8px;
  border-radius: 50px;
  box-shadow: var(--shadow-md);
  position: sticky;
  bottom: 0;
}
.comment-input {
  flex: 1; border: none; outline: none;
  font-size: 0.95rem; padding: 8px 12px;
  background: transparent; color: var(--text);
  font-family: inherit;
}
.comment-input::placeholder { color: #C4B8AE; }
.btn-comment {
  background: var(--orange);
  color: #fff; border: none;
  padding: 10px 20px; border-radius: 50px;
  font-weight: 700; font-size: 0.9rem;
  cursor: pointer; flex-shrink: 0;
  transition: transform 0.15s ease;
}
.btn-comment:active { transform: scale(0.94); }
.btn-comment:disabled { opacity: 0.5; pointer-events: none; }

/* ===== BACK BUTTON ===== */
.back-btn {
  background: none; border: none;
  font-size: 1.4rem; cursor: pointer;
  align-self: flex-start; padding: 4px 8px;
  color: var(--text-light);
  transition: color 0.2s ease;
}
.back-btn:hover { color: var(--text); }

/* ===== POSTER OVERLAY ===== */
.poster-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
  padding: 20px;
}
.poster-overlay.show { opacity: 1; pointer-events: auto; }
.poster-card {
  background: #fff;
  border-radius: 20px;
  padding: 24px;
  box-shadow: var(--shadow-lg);
  text-align: center;
  max-width: 340px;
  width: 100%;
}
.poster-card canvas { width: 100%; border-radius: 12px; display: block; }
.poster-actions { display: flex; gap: 10px; margin-top: 16px; }
.poster-actions button {
  flex: 1; padding: 12px 0; border-radius: 50px;
  font-weight: 700; font-size: 0.9rem; cursor: pointer; border: none;
  transition: transform 0.15s ease;
}
.poster-actions button:active { transform: scale(0.95); }
.poster-close { background: #f0f0f0; color: var(--text); }

/* ===== EMPTY / LOADING STATES ===== */
.empty-state {
  text-align: center; padding: 40px 20px; color: var(--text-light);
}
.empty-emoji { font-size: 48px; margin-bottom: 12px; }
.loading-dots {
  display: flex; gap: 6px; justify-content: center; padding: 20px;
}
.loading-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--orange);
  animation: dotBounce 1.4s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.16s; }
.loading-dot:nth-child(3) { animation-delay: 0.32s; }
@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0.4); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* ===== TOAST ===== */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff;
  padding: 12px 24px; border-radius: 50px;
  font-size: 0.9rem; font-weight: 600;
  z-index: 200; opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* ===== RESPONSIVE ===== */
@media (min-width: 481px) {
  .app-container { border-radius: 24px; margin: 20px auto; min-height: calc(100dvh - 40px); box-shadow: var(--shadow-lg); }
  .page { padding: 40px 32px 48px; }
}
</style>
</head>
<body>

<div class="app-container" id="app">

  <!-- ===== COVER PAGE ===== -->
  <div class="page active" id="page-cover">
    <div class="cover-emoji-group">💼😮‍💨☕</div>
    <h1 class="cover-title">测测你的打工魂</h1>

  </div>

  <!-- ===== COMMENT PAGE ===== -->
  <div class="page" id="page-comment">
    <button class="back-btn" id="btn-comment-back">← 返回</button>

      <input class="comment-input" id="comment-input" placeholder="分享你的打工魂感悟..." maxlength="200">
      <button class="btn-comment" id="btn-send-comment">发布</button>
    </div>
  </div>

  <!-- ===== POSTER OVERLAY ===== -->
  <div class="poster-overlay" id="poster-overlay">
    <div class="poster-card">
      <canvas id="poster-canvas" width="600" height="900"></canvas>
      <div class="poster-actions">
        <button class="poster-close" id="btn-poster-close">关闭</button>
        <button class="btn-primary" id="btn-save-poster">💾 保存图片</button>
      </div>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div class="toast" id="toast"></div>

</div>

function showPage(pageName) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

// ===== SOUL ILLUSTRATION DRAWING =====
function drawSoulIllustration(canvas, typeIndex) {
  const ctx = canvas.getContext('2d');
  const W = 560, H = 560, cx = 280, cy = 280;
  ctx.clearRect(0, 0, W, H);

  const C = {
    bg: '#FFF8F0',    skin: '#FFD4A3',  orange: '#FF6B35',
    warmY: '#FFB347',  mint: '#7EC8A0',  sky: '#87CEEB',
    pink: '#FF8FAB',   purple: '#A78BFA', dark: '#4A3728',
    gray: '#C4C4C4',   white: '#FFFFFF',  red: '#EF4444',
    gold: '#FBBF24',   brown: '#8B6914',  teal: '#14B8A6',
    blue: '#3B82F6',   lime: '#84CC16',  darkP: '#2D1B69'
  };

  function roundRect(x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath(); }
  function circle(x, y, r) { ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill(); }
  function line(x1,y1,x2,y2,w,c) { ctx.beginPath(); ctx.strokeStyle=c; ctx.lineWidth=w; ctx.lineCap='round'; ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }

  function body(x, y, s) { ctx.fillStyle=C.skin; roundRect(x-s*14,y,s*28,s*38,s*8); ctx.fill(); }
  function head(x, y, s) { ctx.fillStyle=C.skin; circle(x, y, s*13); }
  function eye(x, y, s, dir) { ctx.fillStyle=C.white; circle(x, y, s*7); ctx.fillStyle=C.dark; circle(x+dir*s*2, y, s*3.5); }
  function mouth(x, y, s, type) {
    ctx.strokeStyle = C.dark; ctx.lineWidth = s*1.5; ctx.lineCap='round';
    ctx.beginPath();
    if (type==='smile') { ctx.arc(x, y-s*2, s*4, 0.2, Math.PI-0.2); }
    else if (type==='open') { ctx.arc(x, y, s*3, 0, Math.PI); }
    else if (type==='surprise') { ctx.arc(x, y+s*2, s*3.5, 0, Math.PI*2); ctx.fillStyle=C.dark; ctx.fill(); return; }
    else if (type==='wink') { ctx.moveTo(x-s*4,y); ctx.lineTo(x+s*4,y); }
    ctx.stroke();
  }

  // ====== ILLUSTRATIONS ======
  const s = 3.2; // base scale

      for (let i=0; i<5; i++) { ctx.fillStyle='#FFF'; roundRect(cx-55+i*10,cy+120-i*14,90,50,6); ctx.fill(); ctx.strokeStyle='#DDD'; ctx.lineWidth=1.5; ctx.stroke(); }
      // Trophy

      eye(cx-14,cy-60,s,0); eye(cx+14,cy-60,s,0);
      const tiredE = [[cx-14,cy-60,s,0],[cx+14,cy-60,s,0]];
      ctx.fillStyle = '#DDD'; roundRect(cx-22,cy-62,16,4,2); ctx.fill(); roundRect(cx+6,cy-62,16,4,2); ctx.fill();
      mouth(cx, cy-48, s*0.7, 'smile');
      body(cx, cy-10, s);
      // trophy cup
      ctx.fillStyle=C.gold; roundRect(cx-28,cy-100,56,55,8); ctx.fill();
      ctx.fillStyle='#FFF'; roundRect(cx-20,cy-90,40,35,5); ctx.fill();
      ctx.fillStyle=C.gold; roundRect(cx-10,cy-120,20,25,4); ctx.fill();
      circle(cx,cy-118,8); // trophy top
      // coffee cup
      ctx.fillStyle='#8B4513'; roundRect(cx+50,cy-20,22,28,5); ctx.fill();
      // number "1"

      // sparkles
      ctx.fillStyle=C.gold; circle(cx-70,cy-130,6); circle(cx+80,cy-110,5); circle(cx-50,cy-160,4);

function resultDraw(typeIndex) {
  const canvas = document.getElementById('result-canvas');
  if (!canvas) return;
  drawSoulIllustration(canvas, typeIndex);
  canvas.style.animation = 'none';
  void canvas.offsetWidth;
  canvas.style.animation = 'resultPop 0.6s cubic-bezier(0.34,1.56,0.64,1) both';
}

function generateNickname() {
  const prefixes = ['打工', '搬砖', '摸鱼', '划水', '躺平', '加班', '带薪', '奋斗', '快乐', '暴躁'];
  const suffixes = ['人', '选手', '大师', '小能手', '侠', '仔', '君', '星人', '战士', '达人'];
  const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
  const suffix = suffixes[Math.floor(Math.random() * suffixes.length)];
  return prefix + suffix + Math.floor(Math.random() * 100);
}

// 防重复提交（5分钟内）
function canSubmit() {
  const lastSubmit = localStorage.getItem('dagonghun_last_submit');
  if (!lastSubmit) return true;
  return Date.now() - parseInt(lastSubmit) > 5 * 60 * 1000;
}

function markSubmitted() {
  localStorage.setItem('dagonghun_last_submit', Date.now().toString());
}

function saveResult(typeId) {
  localStorage.setItem('dagonghun_result', typeId.toString());
  localStorage.setItem('dagonghun_nickname', userNickname);
}

function loadSavedResult() {
  const r = localStorage.getItem('dagonghun_result');
  const n = localStorage.getItem('dagonghun_nickname');
  if (r && n) {
    userResultType = parseInt(r);
    userNickname = n;
    return true;
  }
  return false;
}

// ==================== API (Supabase) ====================
async function apiGetParticipantCount() {
  if (!sbClient) return 0;
  try {
    const { count, error } = await sbClient
      .from('results')
      .select('*', { count: 'exact', head: true });
    if (error) throw error;
    // Add a base number so it looks populated
    return (count || 0) + 128;
  } catch (e) {
    console.error('获取参与人数失败:', e);
    return 128;
  }
}

async function apiSubmitResult(typeId) {
  if (!sbClient || !canSubmit()) return false;
  try {
    const { error } = await sbClient
      .from('results')
      .insert([{ result_type: typeId }]);
    if (error) throw error;
    markSubmitted();
    return true;
  } catch (e) {
    console.error('提交结果失败:', e);
    // 本地存储兜底
    return false;
  }
}

async function apiGetRanking() {
  if (!sbClient) return [];
  try {
    const { data, error } = await sbClient
      .from('results')
      .select('result_type');
    if (error) throw error;
    return data || [];
  } catch (e) {
    console.error('获取排行榜失败:', e);
    return [];
  }
}

async function apiGetComments() {
  if (!sbClient) return [];
  try {
    const { data, error } = await sbClient
      .from('comments')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(50);
    if (error) throw error;
    return data || [];
  } catch (e) {
    console.error('获取评论失败:', e);
    return [];
  }
}

async function apiAddComment(nickname, resultType, content) {
  if (!sbClient) return false;
  try {
    const { error } = await sbClient
      .from('comments')
      .insert([{ nickname, result_type: resultType, content }]);
    if (error) throw error;
    return true;
  } catch (e) {
    console.error('添加评论失败:', e);
    return false;
  }
}

function renderCover() {

  }).catch(() => {
    document.getElementById('participant-count').textContent = '128';
  });

function renderQuestion() {
  const q = QUESTIONS[currentQuestion];
  document.getElementById('quiz-emoji').textContent = q.emoji;
  document.getElementById('quiz-question').textContent = q.q;
  document.getElementById('progress-text').textContent = (currentQuestion + 1) + '/10';
  document.getElementById('progress-fill').style.width = ((currentQuestion + 1) * 10) + '%';

  const container = document.getElementById('quiz-options');
  container.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];

  q.options.forEach((opt, idx) => {
    const div = document.createElement('div');
    div.className = 'quiz-option';
    div.innerHTML = '<span class="quiz-option-letter">' + letters[idx] + '</span>' + opt[0];
    div.addEventListener('click', () => selectOption(idx));
    container.appendChild(div);
  });
}

function selectOption(idx) {
  const selectedTypes = QUESTIONS[currentQuestion].options[idx][1];
  selectedTypes.forEach(t => scores[t]++);

  const options = document.querySelectorAll('.quiz-option');
  options.forEach(o => o.classList.remove('selected'));
  options[idx].classList.add('selected');

  setTimeout(() => {
    if (currentQuestion < 9) {
      currentQuestion++;
      renderQuestion();
    } else {
      finishQuiz();
    }
  }, 350);
}

function finishQuiz() {
  // Find the type with highest score
  let maxScore = -1;
  let bestTypes = [];
  for (let i = 1; i <= 16; i++) {
    if (scores[i] > maxScore) {
      maxScore = scores[i];
      bestTypes = [i];
    } else if (scores[i] === maxScore) {
      bestTypes.push(i);
    }
  }
  // Random if tie
  const finalType = bestTypes[Math.floor(Math.random() * bestTypes.length)];
  userResultType = finalType;
  userNickname = generateNickname();
  saveResult(finalType);

  const soul = SOUL_TYPES[finalType - 1];
  resultDraw(finalType);
  document.getElementById('result-type').textContent = '你的打工魂：' + soul.name;
  document.getElementById('result-desc').textContent = soul.desc;
  const tagsDiv = document.getElementById('result-tags');
  tagsDiv.innerHTML = soul.tags.map(t => '<span class="result-tag">#' + t + '</span>').join('');

  showPage('result');

  // Submit to backend
  apiSubmitResult(finalType).then(() => {
    apiGetParticipantCount().then(count => {
      document.getElementById('participant-count').textContent = count;
    });
  });
}

async function renderRanking() {
  const results = await apiGetRanking();

  // Count by type
  const counts = new Array(17).fill(0);
  let total = 0;
  results.forEach(r => {
    if (r.result_type >= 1 && r.result_type <= 16) {
      counts[r.result_type]++;
      total++;
    }
  });

  // Sort by count desc
  const ranked = SOUL_TYPES.map(s => ({
    ...s,
    count: counts[s.id] || 0,
    pct: total > 0 ? Math.round((counts[s.id] || 0) / total * 100) : 0,
  })).sort((a, b) => b.count - a.count || a.id - b.id);

  document.getElementById('ranking-total').textContent = '共有 ' + (total || '--') + ' 人参与';

  const container = document.getElementById('ranking-list');
  container.innerHTML = ranked.map((s, idx) => {
    const isYou = userResultType === s.id;
    return `
      <div class="ranking-item${isYou ? ' is-you' : ''}">
        <span class="ranking-rank">${idx + 1}</span>
        <span class="ranking-emoji">${s.emoji}</span>
        <span class="ranking-name">${s.name}</span>
        <div class="ranking-bar-wrap"><div class="ranking-bar" style="width:${Math.max(s.pct, 3)}%"></div></div>
        <span class="ranking-pct">${s.pct}%</span>
      </div>
    `;
  }).join('');
}

async function renderComments() {
  const comments = await apiGetComments();
  const container = document.getElementById('comment-list');

  if (comments.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-emoji">💭</div>
        <p>还没有评论，来做第一个留言的人吧！</p>
      </div>`;
    return;
  }

  container.innerHTML = comments.map(c => {
    const soul = SOUL_TYPES.find(s => s.id === c.result_type);
    return `
      <div class="comment-item">
        <div class="comment-header">
          <span class="comment-nickname">${escapeHtml(c.nickname)}</span>
          <span class="comment-type-tag">${soul ? soul.emoji + ' ' + soul.name : '未知'}</span>
        </div>
        <div class="comment-body">${escapeHtml(c.content)}</div>
      </div>`;
  }).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ==================== POSTER ====================
function generatePoster() {
  const soul = SOUL_TYPES[userResultType - 1];
  const overlay = document.getElementById('poster-overlay');
  const canvas = document.getElementById('poster-canvas');
  const ctx = canvas.getContext('2d');
  const W = 600, H = 900;

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#FFF8F0');
  bgGrad.addColorStop(0.5, '#FFF1E0');
  bgGrad.addColorStop(1, '#FFE8D6');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Decorative circles
  ctx.fillStyle = 'rgba(255,107,53,0.08)';
  ctx.beginPath(); ctx.arc(500, 120, 160, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(80, 700, 200, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,210,63,0.12)';
  ctx.beginPath(); ctx.arc(100, 200, 100, 0, Math.PI*2); ctx.fill();

  // Title
  ctx.fillStyle = '#2D2420';
  ctx.font = 'bold 40px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('测测你的打工魂', W/2, 80);

  // Emoji
  ctx.font = '100px sans-serif';
  ctx.fillText(soul.emoji, W/2, 210);

  // Type name
  ctx.font = 'bold 52px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillStyle = '#FF6B35';
  ctx.fillText(soul.name, W/2, 300);

  // Divider
  ctx.strokeStyle = '#FFD23F';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(150, 330);
  ctx.lineTo(450, 330);
  ctx.stroke();

  // Description
  ctx.fillStyle = '#7A6E66';
  ctx.font = '22px "PingFang SC","Microsoft YaHei",sans-serif';
  const descLines = wrapText(ctx, soul.desc, 420);
  descLines.forEach((line, i) => {
    ctx.fillText(line, W/2, 380 + i * 36);
  });

  // Tags
  const tagY = 380 + descLines.length * 36 + 30;
  ctx.font = 'bold 20px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillStyle = '#FF6B35';
  let tagX = W/2 - (soul.tags.length * 100) / 2 + 50;
  soul.tags.forEach(tag => {
    ctx.fillStyle = '#FFF1E0';
    ctx.beginPath();
    const tw = ctx.measureText('#' + tag).width + 30;
    roundRect(ctx, tagX - tw/2, tagY - 16, tw, 36, 50);
    ctx.fill();
    ctx.fillStyle = '#FF6B35';
    ctx.fillText('#' + tag, tagX, tagY + 10);
    tagX += tw + 20;
  });

  // Bottom section
  const bottomY = tagY + 80;
  ctx.fillStyle = '#FF6B35';
  ctx.font = 'bold 24px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText('扫码测测你的打工魂', W/2, bottomY);

  // QR code placeholder
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(W/2 - 60, bottomY + 20, 120, 120);
  ctx.fillStyle = '#FF6B35';
  ctx.font = '14px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText('二维码占位', W/2, bottomY + 85);

  overlay.classList.add('show');
}

function wrapText(ctx, text, maxWidth) {
  const lines = [];
  let current = '';
  for (const char of text) {
    const test = current + char;
    if (ctx.measureText(test).width > maxWidth && current.length > 0) {
      lines.push(current);
      current = char;
    } else {
      current = test;
    }
  }
  if (current) lines.push(current);
  return lines;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function savePoster() {
  const canvas = document.getElementById('poster-canvas');
  const link = document.createElement('a');
  link.download = '我的打工魂.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('海报已保存！');
}

document.getElementById('btn-send-comment').addEventListener('click', async () => {
  const input = document.getElementById('comment-input');
  const content = input.value.trim();
  if (!content) return;

  const btn = document.getElementById('btn-send-comment');
  btn.disabled = true;
  btn.textContent = '发送中...';

  let nickname = userNickname;
  if (!nickname) {
    const saved = localStorage.getItem('dagonghun_nickname');
    nickname = saved || generateNickname();
    userNickname = nickname;
  }

  const success = await apiAddComment(nickname, userResultType || 1, content);
  if (success || !sbClient) {
    input.value = '';
    await renderComments();
    showToast('评论发布成功！');
  } else {
    showToast('发布失败，请稍后重试');
  }

  btn.disabled = false;
  btn.textContent = '发布';
});

// Enter key to send comment
document.getElementById('comment-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('btn-send-comment').click();
  }
});

// ==================== INIT ====================
function init() {
  try {
    initSupabase();
  } catch(e) {
    console.warn('Supabase 初始化失败（不影响答题）:', e);
  }
  renderCover();

  // Check if user already has a result (coming back)
  if (loadSavedResult()) {
    try {
      const soul = SOUL_TYPES[userResultType - 1];
      resultDraw(userResultType);
      document.getElementById('result-type').textContent = '你的打工魂：' + soul.name;
      document.getElementById('result-desc').textContent = soul.desc;
      document.getElementById('result-tags').innerHTML = soul.tags.map(t => '<span class="result-tag">#' + t + '</span>').join('');
    } catch(e) {
      console.warn('恢复结果失败:', e);
    }
  }
}

// 确保 DOM 就绪后初始化
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
